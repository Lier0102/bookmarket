services:
  mysql:
    image: mysql:8.0
    container_name: bookmarket-mysql
    restart: unless-stopped
    ports:
      - "3308:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: bookmarket
      MYSQL_USER: bankai
      MYSQL_PASSWORD: bankai
    volumes:
      - bookmarket-mysql-data:/var/lib/mysql

volumes:
  bookmarket-mysql-data:
